model: "azure/gpt-5-model"
# For Azure OpenAI:
# Set AZURE_API_KEY and AZURE_API_BASE in .env
# model should be prefixed with "azure/"
# Example: model: "azure/gpt-5-model"

# openai-agents  # optional: required for examples/agentic_vectorless_rag_demo.py
retrieve_model: "azure/gpt-5-model"  # defaults to `model` if not set
toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "yes"
if_add_doc_description: "no"
if_add_node_text: "no"